# =============================================================================
#  frdm_env_monitor — prj.conf
#  NXP FRDM-MCXN947  |  Zephyr RTOS 4.4.x
# =============================================================================

# ── Kernel ────────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ── Multithreading ────────────────────────────────────────────────────────────
CONFIG_MULTITHREADING=y

# ── Logging / consola UART ────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── I2C (BME680 en FC3, LIS3DH en FC2) ───────────────────────────────────────
CONFIG_I2C=y

# ── I3C (P3T1755DP embebido) ──────────────────────────────────────────────────
CONFIG_I3C=y

# ── Drivers de sensor ─────────────────────────────────────────────────────────
CONFIG_SENSOR=y
CONFIG_BME680=y
# LIS3DH usa el driver genérico ST LIS2DH (cubre toda la familia)
CONFIG_LIS2DH=y

# ── GPIO (LED RGB) ────────────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── Input / Touch slider (TSI0) ───────────────────────────────────────────────
CONFIG_INPUT=y
